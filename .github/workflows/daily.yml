name: Daily Portfolio Build
on:
  schedule:
    # 22:30 UTC = 07:30 KST (한국 시간 아침)
    - cron: '30 22 * * *'
  workflow_dispatch:  # 수동 실행 가능

env:
  # Force Node.js 24 runtime for JS-based actions.
  # Removes the Node 20 deprecation warning (effective 2026-06).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify required secrets are present
        # Hard-fail if essential secrets are missing - prevents stale/empty builds.
        # Values are not echoed, only their presence/length.
        env:
          PORTFOLIO_CSV_DATA:  ${{ secrets.PORTFOLIO_CSV_DATA }}
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
          TICKER_MAP_DATA:     ${{ secrets.TICKER_MAP_DATA }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          FRED_API_KEY:        ${{ secrets.FRED_API_KEY }}
        run: |
          set -e
          fail=0
          require() {
            local var="$1"
            if [ -z "${!var}" ]; then
              echo "  [REQUIRED MISSING] $var"
              fail=1
            else
              echo "  [ok] $var (${#var} chars)"
            fi
          }
          warn() {
            local var="$1"
            if [ -z "${!var}" ]; then
              echo "  [recommended missing] $var - feature will be skipped"
            else
              echo "  [ok] $var"
            fi
          }
          echo "Required:"
          require PORTFOLIO_CSV_DATA
          require STATICRYPT_PASSWORD
          echo "Recommended:"
          warn TICKER_MAP_DATA
          warn GEMINI_API_KEY
          warn FRED_API_KEY
          if [ $fail -ne 0 ]; then
            echo ""
            echo "FATAL: required secrets missing. Register them at:"
            echo "  https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

      - name: Restore portfolio + mapping files from Secrets (plain text)
        env:
          PORTFOLIO_CSV_DATA: ${{ secrets.PORTFOLIO_CSV_DATA }}
          TICKER_MAP_DATA:    ${{ secrets.TICKER_MAP_DATA }}
          YIELD_MAP_DATA:     ${{ secrets.YIELD_MAP_DATA }}
          BOND_ETF_MAP_DATA:  ${{ secrets.BOND_ETF_MAP_DATA }}
          FUND_MAP_DATA:      ${{ secrets.FUND_MAP_DATA }}
        run: |
          set -e
          write_to() {
            local var="$1"; local path="$2"
            if [ -n "${!var}" ]; then
              printf '%s' "${!var}" > "$path"
              echo "  restored: $path ($(wc -c < "$path") bytes)"
            else
              echo "  [skip] $var not set"
            fi
          }
          write_to PORTFOLIO_CSV_DATA portfolio.csv
          write_to TICKER_MAP_DATA    ticker_map.csv
          write_to YIELD_MAP_DATA     yield_map.csv
          write_to BOND_ETF_MAP_DATA  bond_etf_map.csv
          write_to FUND_MAP_DATA      fund_map.csv

      - name: Build site
        env:
          USE_EXCEL_PORTFOLIO: 'false'
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
        run: python main.py

      - name: Copy dist to root
        # Keep existing archive files (historical daily reports) and ADD today's.
        # DO NOT rm -rf archive — that deletes all past dates!
        run: |
          cp dist/index.html ./index.html
          cp dist/.nojekyll ./.nojekyll
          cp dist/robots.txt ./robots.txt
          mkdir -p ./archive ./static
          cp -r dist/archive/* ./archive/ 2>/dev/null || true
          cp -r dist/static/* ./static/ 2>/dev/null || true

      - name: Commit and push
        # data/history.enc is encrypted, safe to commit and accumulates across runs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html archive/ static/ robots.txt .nojekyll data/history.enc
          if git diff --cached --quiet; then
            echo "no changes - skip commit"
          else
            git commit -m "Daily build $(date -u +%Y-%m-%d_%H:%M)Z"
            git push
          fi
