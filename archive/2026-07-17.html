const PW_KEY = "pw_v2";
const TTL_MS = 300000;

function b64ToBuf(s) {
  const bin = atob(s);
  const u8 = new Uint8Array(bin.length);
  for (let i=0; i<bin.length; i++) u8[i] = bin.charCodeAt(i);
  return u8.buffer;
}

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: salt, iterations: 250000, hash: "SHA-256" },
    baseKey,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

// 비번 캐시 — 5분 TTL, 만료 시 자동 삭제
function cacheSet(pw) {
  try { sessionStorage.setItem(PW_KEY, JSON.stringify({p: pw, t: Date.now()})); } catch(e) {}
}
function cacheGet() {
  try {
    const raw = sessionStorage.getItem(PW_KEY);
    if (!raw) return null;
    const o = JSON.parse(raw);
    if (!o || typeof o.p !== "string" || typeof o.t !== "number") return null;
    if (Date.now() - o.t > TTL_MS) {
      sessionStorage.removeItem(PW_KEY);
      return null;
    }
    return o.p;
  } catch(e) { return null; }
}
function cacheClear() { try { sessionStorage.removeItem(PW_KEY); } catch(e) {} }

// 같은 사이트 내 archive 페이지 간 이동은 hidden->visible을 매우 빠르게 거치므로
// hidden 상태가 30초 이상 지속되어 visible로 돌아왔을 때만 캐시 만료.
// 짧은 페이지 이동에서는 캐시 유지 -> 한 번 로그인하면 모든 archive 자유 이동.
let _hiddenSince = 0;
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden") {
    _hiddenSince = Date.now();
  } else if (_hiddenSince > 0 && Date.now() - _hiddenSince > 30000) {
    cacheClear();
    _hiddenSince = 0;
  } else {
    _hiddenSince = 0;
  }
});

    const data = new Uint8Array(b64ToBuf(ENC));
    const salt = data.slice(0, 16);
    const iv = data.slice(16, 16 + 12);
    const ct = data.slice(16 + 12);
    const key = await deriveKey(password, salt);
    const ptBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ct);
    const html = new TextDecoder().decode(ptBuf);

    cacheSet(password);

    document.open();
    document.write(html);
    document.close();
  } catch(e) {
    cacheClear();
    document.getElementById("err").textContent = "비밀번호가 올바르지 않습니다.";
  }
}

document.getElementById("form").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  document.getElementById("err").textContent = "";
  const pw = document.getElementById("pw").value;
  if (!pw) return;
  await decryptAndShow(pw);
});

// 페이지 로드 시 유효한 캐시가 있으면 자동 시도
(async () => {
  const cached = cacheGet();
  if (cached) await decryptAndShow(cached);
})();
</script>
